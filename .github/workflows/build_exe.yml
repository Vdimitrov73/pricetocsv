name: Build Windows EXE

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write          # required to create GitHub Releases

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Patch version.txt
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart("v")
          $parts = $tag.Split(".")
          $v = "$($parts[0]), $($parts[1]), $($parts[2]), 0"
          $vs = "$($parts[0]).$($parts[1]).$($parts[2]).0"
          (Get-Content version.txt) -replace "\(\d+, \d+, \d+, \d+\)", "($v)" | Set-Content version.txt
          (Get-Content version.txt) -replace "\d+\.\d+\.\d+\.0", "$vs" | Set-Content version.txt

      - name: Build EXE
        run: pyinstaller --onefile --console --name PriceToCSV --version-file version.txt PriceToCSV.py

      - name: Compute SHA256
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist\PriceToCSV.exe -Algorithm SHA256).Hash.ToLower()
          echo "SHA256=$hash" >> $env:GITHUB_ENV

      - name: Package release bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release_staging | Out-Null
          Copy-Item dist\PriceToCSV.exe  release_staging\
          Copy-Item config.json          release_staging\
          Copy-Item README.FIRST.txt     release_staging\
          Copy-Item README.md            release_staging\
          Copy-Item setup.bat            release_staging\
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path release_staging\* -DestinationPath "release_staging\PriceToCSV_${tag}.zip"

      - name: Extract changelog for this tag
        id: changelog
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart("v")
          $content = Get-Content CHANGELOG.md -Raw
          # grab the block between this version header and the next ---
          if ($content -match "(?s)## \[$ver\][^\n]*\n(.*?)(\n---|\z)") {
            $notes = $Matches[1].Trim()
          } else {
            $notes = "See CHANGELOG.md for details."
          }
          # Append SHA256 to release notes
          $notes += "`n`n**SHA256:** ${{ env.SHA256 }}"
          # write to file to avoid multiline env issues
          $notes | Out-File -FilePath release_notes.txt -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PriceToCSV ${{ github.ref_name }}"
          body_path: release_notes.txt
          files: |
            release_staging/PriceToCSV_${{ github.ref_name }}.zip
            setup.bat
          draft: false
          prerelease: false
