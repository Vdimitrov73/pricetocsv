workflow:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'

stages:
  - build
  - release

build-exe:
  stage: build
  tags:
    - saas-windows-medium-amd64
  script:
    - python --version
    - pip install pyinstaller
    - 'pyinstaller --onefile --console --name PriceToCSV PriceToCSV.py'
    - '$hash = (Get-FileHash dist\PriceToCSV.exe -Algorithm SHA256).Hash.ToLower()'
    - '$version = $env:CI_COMMIT_TAG'
    - '$zipName = "PriceToCSV_${version}.zip"'
	- 'Set-Content -Path build.env -Value "SHA256=$hash"    -Encoding utf8'
	- 'Add-Content -Path build.env -Value "ZIP_NAME=$zipName" -Encoding utf8'
    - 'New-Item -ItemType Directory -Path release_staging'
    - 'Copy-Item dist\PriceToCSV.exe  release_staging\'
    - 'Copy-Item config.json          release_staging\'
    - 'Copy-Item README.FIRST.txt     release_staging\'
    - 'Copy-Item README.md            release_staging\'
    - 'Copy-Item setup.bat            release_staging\'
    - 'Compress-Archive -Path release_staging\* -DestinationPath $zipName'
  artifacts:
    paths:
      - dist/PriceToCSV.exe
      - "PriceToCSV_*.zip"
      - setup.bat
    reports:
      dotenv: build.env
    expire_in: 1 week


release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build-exe
      artifacts: true
  variables:
    GIT_STRATEGY: none
  script:
    - echo "Creating release $CI_COMMIT_TAG"
  release:
    name:        "$CI_COMMIT_TAG"
    tag_name:    "$CI_COMMIT_TAG"
    description: |
      ## PriceToCSV $CI_COMMIT_TAG

      ### Download
      - **PriceToCSV_$CI_COMMIT_TAG.zip** - Windows standalone bundle (no Python required)
      - **setup.bat** - Python users: download this + the source ZIP, run setup.bat

      Getting started (no Python): unzip anywhere, read README.FIRST.txt, run PriceToCSV.exe.
      Getting started (Python): download source ZIP + setup.bat, extract, double-click setup.bat.

      SmartScreen warning: click More info then Run anyway.

      SHA256: $SHA256
    assets:
      links:
        - name: "PriceToCSV_$CI_COMMIT_TAG.zip"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/PriceToCSV_$CI_COMMIT_TAG.zip?job=build-exe"
          link_type: package
        - name: "setup.bat"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/setup.bat?job=build-exe"
          link_type: other
